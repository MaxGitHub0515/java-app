<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Place Order — ShopAdmin</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="shell">

  <nav th:replace="fragments/layout :: sidebar('orders')"></nav>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Place new order</span>
      <div class="topbar-right">
        <a th:href="@{/orders}" class="btn">← Cancel</a>
      </div>
    </div>
    <div class="content">

      <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

      <form th:action="@{/orders/place}" method="post">
        <div class="panel-row">

          <!-- Customer selector -->
          <div class="panel">
            <div class="panel-head"><span class="panel-title">Customer</span></div>
            <div class="form-group">
              <label class="form-label">Select customer *</label>
              <select class="form-select" name="customerId" required>
                <option value="">— Choose customer —</option>
                <option th:each="c : ${customers}"
                        th:value="${c.customerId}"
                        th:text="${c.fullName} + ' (' + ${c.email} + ')'">Customer</option>
              </select>
            </div>
          </div>

          <!-- Summary hint -->
          <div class="panel" style="background:var(--bg-secondary);border-style:dashed">
            <div class="panel-head"><span class="panel-title">How to place an order</span></div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.7">
              Select a customer, then enter a quantity next to each product you want to include.
              Leave quantity as <strong>0</strong> to exclude a product.
              Stock will be deducted automatically on save.
            </p>
          </div>

        </div>

        <!-- Product rows -->
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Products</span></div>
          <div style="display:grid;grid-template-columns:2fr 1fr 80px;gap:0;margin-bottom:4px;padding:0 4px">
            <span style="font-size:11px;color:var(--text-tertiary)">Product</span>
            <span style="font-size:11px;color:var(--text-tertiary)">Unit price</span>
            <span style="font-size:11px;color:var(--text-tertiary)">Qty</span>
          </div>
          <div th:each="p : ${products}" class="product-row">
            <input type="hidden" name="productIds" th:value="${p.productId}"/>
            <span th:text="${p.name}">Product</span>
            <span style="color:var(--text-secondary)"
                  th:text="'$' + ${#numbers.formatDecimal(p.price,1,'COMMA',2,'POINT')}">$0</span>
            <input class="qty-input" type="number" name="quantities" value="0" min="0"
                   th:max="${p.stockQuantity}"/>
          </div>
        </div>

        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-primary" type="submit">Place order</button>
          <a th:href="@{/orders}" class="btn">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>
</body>
</html>
