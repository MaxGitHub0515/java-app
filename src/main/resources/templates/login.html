<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — ShopAdmin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-tertiary); }
        .login-box { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:36px 32px; width:340px; }
        .login-logo { font-size:16px; font-weight:500; margin-bottom:4px; }
        .login-sub  { font-size:12px; color:var(--text-tertiary); margin-bottom:28px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-logo">ShopAdmin</div>
    <div class="login-sub">E-Commerce Panel — sign in to continue</div>

    <div th:if="${param.error}"  class="alert alert-error"  style="margin-bottom:14px">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom:14px">You have been signed out.</div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" name="username" autofocus/>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" name="password"/>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px;justify-content:center">
            Sign in
        </button>
    </form>
</div>
</body>
</html>
